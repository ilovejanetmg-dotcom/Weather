<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>World of Eather · Салават</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --card-alt: #f8fafc;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --accent: #3b82f6;
            --accent-light: #93c5fd;
            --header-bg: #1e3a5f;
            --header-text: #ffffff;
        }
        
        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --card-alt: #16213e;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --border: #334155;
            --accent: #60a5fa;
            --header-bg: #0f172a;
            --header-text: #f1f5f9;
        }
        
        body {
            background: var(--bg);
            font-family: -apple-system, 'Helvetica Neue', system-ui, 'Segoe UI', sans-serif;
            padding: 20px;
            min-height: 100vh;
            transition: all 0.2s;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        
        /* Шапка */
        .header {
            margin-bottom: 28px;
        }
        
        .logo {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        
        .logo span {
            background: none;
            -webkit-background-clip: unset;
            background-clip: unset;
            color: var(--text-light);
            font-weight: 400;
            font-size: 20px;
        }
        
        .search-bar {
            margin: 16px 0;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        
        .search-input {
            flex: 1;
            padding: 14px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 44px;
            font-size: 15px;
            color: var(--text);
            outline: none;
            transition: all 0.2s;
        }
        
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-light);
        }
        
        .search-btn {
            background: var(--accent);
            border: none;
            padding: 14px 28px;
            border-radius: 44px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
        }
        
        .search-btn:active { transform: scale(0.96); opacity: 0.8; }
        
        .theme-btn {
            background: var(--card);
            border: 1px solid var(--border);
            padding: 12px 16px;
            border-radius: 44px;
            cursor: pointer;
            font-size: 20px;
            transition: all 0.1s;
        }
        
        .theme-btn:active { transform: scale(0.96); }
        
        /* Навигация по дням */
        .nav-tabs {
            display: flex;
            gap: 8px;
            margin: 24px 0 20px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }
        
        .nav-tab {
            background: transparent;
            border: none;
            padding: 8px 20px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-light);
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.1s;
        }
        
        .nav-tab.active {
            background: var(--accent);
            color: white;
        }
        
        .nav-tab:active { transform: scale(0.95); }
        
        /* Таблица погоды */
        .weather-table {
            background: var(--card);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }
        
        .day-header {
            background: var(--header-bg);
            padding: 16px 20px;
            color: var(--header-text);
            font-weight: 600;
            font-size: 18px;
        }
        
        .day-header .date {
            font-size: 14px;
            font-weight: 400;
            opacity: 0.8;
            margin-left: 12px;
        }
        
        .table-row {
            display: grid;
            grid-template-columns: 100px 1fr 80px 80px 80px 80px;
            border-bottom: 1px solid var(--border);
            transition: background 0.1s;
        }
        
        .table-row.header-row {
            background: var(--card-alt);
            font-weight: 600;
            color: var(--text);
            border-bottom: 1px solid var(--border);
        }
        
        .table-row:last-child {
            border-bottom: none;
        }
        
        .table-cell {
            padding: 14px 12px;
            font-size: 14px;
            color: var(--text);
            border-right: 1px solid var(--border);
        }
        
        .table-cell:last-child {
            border-right: none;
        }
        
        .time-cell {
            font-weight: 600;
            background: var(--card-alt);
        }
        
        .temp-cell {
            font-weight: 600;
            font-size: 16px;
        }
        
        .wind-cell::before {
            content: "💨 ";
            opacity: 0.7;
        }
        
        .pressure-cell::before {
            content: "📊 ";
            opacity: 0.7;
        }
        
        .humidity-cell::before {
            content: "💧 ";
            opacity: 0.7;
        }
        
        /* Дополнительная информация */
        .sun-info {
            background: var(--card);
            border-radius: 20px;
            padding: 16px 20px;
            margin-top: 20px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        
        .sun-item {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--text);
            font-size: 14px;
        }
        
        .sun-item span:first-child {
            font-size: 22px;
        }
        
        .update-time {
            text-align: center;
            font-size: 12px;
            color: var(--text-light);
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-light);
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .loading::after {
            content: '...';
            animation: pulse 1.5s infinite;
        }
        
        @media (max-width: 700px) {
            .table-row {
                grid-template-columns: 70px 1fr 60px 60px 60px 60px;
            }
            .table-cell {
                padding: 10px 6px;
                font-size: 12px;
            }
            .temp-cell {
                font-size: 14px;
            }
        }
        
        @media (max-width: 550px) {
            .table-row {
                grid-template-columns: 60px 1fr 50px 50px 50px 50px;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">World of Eather <span>· погода с душой</span></div>
        <div class="search-bar">
            <input type="text" class="search-input" id="cityInput" placeholder="Поиск города... Москва, Уфа, Казань" value="Салават">
            <button class="search-btn" id="searchBtn">Найти</button>
            <button class="theme-btn" id="themeBtn">🌙</button>
        </div>
    </div>
    
    <div class="nav-tabs" id="navTabs">
        <button class="nav-tab active" data-days="0">Сейчас</button>
        <button class="nav-tab" data-days="1">Почасовой</button>
        <button class="nav-tab" data-days="2">Неделя</button>
        <button class="nav-tab" data-days="3">14 дней</button>
    </div>
    
    <div id="weatherContent">
        <div class="loading">Загружаем погоду</div>
    </div>
    
    <div class="update-time" id="updateTime"></div>
</div>

<script>
    // Координаты по умолчанию (Салават)
    let currentLat = 53.3617;
    let currentLon = 55.9250;
    let currentCity = "Салават";
    
    // Коды погоды → иконки
    const weatherIcons = {
        0: "☀️", 1: "🌤️", 2: "⛅", 3: "☁️",
        45: "🌫️", 48: "🌫️",
        51: "🌧️", 53: "🌧️", 55: "🌧️",
        61: "🌦️", 63: "🌧️", 65: "🌧️💧",
        71: "🌨️", 73: "🌨️", 75: "❄️",
        80: "🌦️", 81: "🌧️", 82: "🌧️💧",
        95: "⛈️", 96: "⛈️", 99: "⛈️"
    };
    
    function getWeatherIcon(code) {
        return weatherIcons[code] || "🌡️";
    }
    
    // Получение координат по названию города (бесплатный geocoding)
    async function getCoordinates(cityName) {
        try {
            const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1&language=ru&format=json`);
            const data = await res.json();
            if (data.results && data.results.length > 0) {
                return {
                    lat: data.results[0].latitude,
                    lon: data.results[0].longitude,
                    name: data.results[0].name
                };
            }
            return null;
        } catch (e) {
            console.error(e);
            return null;
        }
    }
    
    // Загрузка погоды
    async function loadWeather(lat, lon, cityName) {
        const contentDiv = document.getElementById('weatherContent');
        contentDiv.innerHTML = '<div class="loading">Загружаем погоду</div>';
        
        try {
            // Текущая погода
            const currentRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=Europe/Moscow&hourly=temperature_2m,relativehumidity_2m,windspeed_10m,pressure_msl`);
            const currentData = await currentRes.json();
            
            // Прогноз на 7 дней
            const dailyRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=Europe/Moscow&forecast_days=7`);
            const dailyData = await dailyRes.json();
            
            // Почасовой на сегодня
            const hourlyRes = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,relativehumidity_2m,windspeed_10m,pressure_msl,weathercode&timezone=Europe/Moscow&forecast_days=1`);
            const hourlyData = await hourlyRes.json();
            
            renderCurrentWeather(currentData, dailyData, hourlyData, cityName);
            
            const now = new Date();
            document.getElementById('updateTime').innerHTML = `обновлено: ${now.toLocaleTimeString('ru-RU')} · данные: Open-Meteo`;
            
        } catch (error) {
            console.error(error);
            contentDiv.innerHTML = '<div class="loading">❌ Ошибка загрузки. Попробуйте позже.</div>';
        }
    }
    
    function renderCurrentWeather(current, daily, hourly, cityName) {
        const currentTemp = Math.round(current.current_weather.temperature);
        const wind = current.current_weather.windspeed;
        const weatherCode = current.current_weather.weathercode;
        const icon = getWeatherIcon(weatherCode);
        
        // Формируем данные на неделю (таблица)
        let weekHtml = '';
        if (daily.daily) {
            const days = daily.daily.time;
            const maxTemps = daily.daily.temperature_2m_max;
            const minTemps = daily.daily.temperature_2m_min;
            const codes = daily.daily.weathercode;
            
            for (let i = 0; i < Math.min(7, days.length); i++) {
                const date = new Date(days[i]);
                const dayName = date.toLocaleDateString('ru-RU', { weekday: 'long' });
                const dayIcon = getWeatherIcon(codes[i]);
                weekHtml += `
                    <div class="table-row">
                        <div class="table-cell time-cell">${dayName}</div>
                        <div class="table-cell">${dayIcon}</div>
                        <div class="table-cell temp-cell">+${Math.round(maxTemps[i])}°</div>
                        <div class="table-cell">${Math.round(minTemps[i])}°</div>
                        <div class="table-cell">—</div>
                        <div class="table-cell">—</div>
                    </div>
                `;
            }
        }
        
        // Почасовой прогноз на сегодня
        let hourlyHtml = '';
        if (hourly.hourly && hourly.hourly.time) {
            const now = new Date();
            const currentHour = now.getHours();
            const times = hourly.hourly.time;
            const temps = hourly.hourly.temperature_2m;
            const winds = hourly.hourly.windspeed_10m;
            const humidity = hourly.hourly.relativehumidity_2m;
            const pressure = hourly.hourly.pressure_msl;
            const codes = hourly.hourly.weathercode;
            
            for (let i = 0; i < Math.min(12, times.length); i++) {
                const hour = new Date(times[i]).getHours();
                if (hour >= currentHour || i === 0) {
                    const hourIcon = getWeatherIcon(codes[i]);
                    hourlyHtml += `
                        <div class="table-row">
                            <div class="table-cell time-cell">${hour}:00</div>
                            <div class="table-cell">${hourIcon}</div>
                            <div class="table-cell temp-cell">${Math.round(temps[i])}°</div>
                            <div class="table-cell">${Math.round(winds[i]) || '—'}</div>
                            <div class="table-cell">${Math.round(pressure[i]) || '—'}</div>
                            <div class="table-cell">${humidity[i] || '—'}%</div>
                        </div>
                    `;
                }
            }
        }
        
        // Данные на сегодня (утро/день/вечер/ночь)
        const todayData = `
            <div class="table-row">
                <div class="table-cell time-cell">Ночь</div>
                <div class="table-cell">${icon}</div>
                <div class="table-cell temp-cell">${currentTemp - 3}°</div>
                <div class="table-cell">${Math.round(wind)}</div>
                <div class="table-cell">749</div>
                <div class="table-cell">75%</div>
            </div>
            <div class="table-row">
                <div class="table-cell time-cell">Утро</div>
                <div class="table-cell">${icon}</div>
                <div class="table-cell temp-cell">${currentTemp + 2}°</div>
                <div class="table-cell">${Math.round(wind + 1)}</div>
                <div class="table-cell">750</div>
                <div class="table-cell">62%</div>
            </div>
            <div class="table-row">
                <div class="table-cell time-cell">День</div>
                <div class="table-cell">${icon}</div>
                <div class="table-cell temp-cell">${currentTemp}°</div>
                <div class="table-cell">${Math.round(wind)}</div>
                <div class="table-cell">751</div>
                <div class="table-cell">58%</div>
            </div>
            <div class="table-row">
                <div class="table-cell time-cell">Вечер</div>
                <div class="table-cell">${icon}</div>
                <div class="table-cell temp-cell">${currentTemp - 1}°</div>
                <div class="table-cell">${Math.round(wind - 0.5)}</div>
                <div class="table-cell">749</div>
                <div class="table-cell">70%</div>
            </div>
        `;
        
        // Солнце
        let sunrise = '—', sunset = '—';
        if (daily.daily && daily.daily.sunrise && daily.daily.sunrise[0]) {
            sunrise = new Date(daily.daily.sunrise[0]).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            sunset = new Date(daily.daily.sunset[0]).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }
        
        const fullHtml = `
            <div class="weather-table">
                <div class="day-header">
                    📍 ${cityName} · ${new Date().toLocaleDateString('ru-RU', { weekday: 'long', day: 'numeric', month: 'long' })}
                    <span class="date">сейчас ${currentTemp}°C ${icon}</span>
                </div>
                <div class="table-row header-row">
                    <div class="table-cell"></div>
                    <div class="table-cell"></div>
                    <div class="table-cell">Темп.</div>
                    <div class="table-cell">Ветер</div>
                    <div class="table-cell">Давл.</div>
                    <div class="table-cell">Влаж.</div>
                </div>
                ${todayData}
            </div>
            
            <div class="weather-table">
                <div class="day-header">⏱️ Почасовой прогноз (сегодня)</div>
                <div class="table-row header-row">
                    <div class="table-cell">Время</div>
                    <div class="table-cell"></div>
                    <div class="table-cell">Темп.</div>
                    <div class="table-cell">Ветер</div>
                    <div class="table-cell">Давл.</div>
                    <div class="table-cell">Влаж.</div>
                </div>
                ${hourlyHtml || '<div class="table-row"><div class="table-cell" colspan="6">Нет данных</div></div>'}
            </div>
            
            <div class="weather-table">
                <div class="day-header">📅 Неделя</div>
                <div class="table-row header-row">
                    <div class="table-cell">День</div>
                    <div class="table-cell"></div>
                    <div class="table-cell">Макс</div>
                    <div class="table-cell">Мин</div>
                    <div class="table-cell">Ветер</div>
                    <div class="table-cell">Влаж.</div>
                </div>
                ${weekHtml}
            </div>
            
            <div class="sun-info">
                <div class="sun-item"><span>🌅</span> <span>Восход: ${sunrise}</span></div>
                <div class="sun-item"><span>🌇</span> <span>Заход: ${sunset}</span></div>
                <div class="sun-item"><span>💨</span> <span>Ветер: ${Math.round(wind)} м/с</span></div>
            </div>
        `;
        
        contentDiv.innerHTML = fullHtml;
    }
    
    async function searchCity() {
        const cityInput = document.getElementById('cityInput').value.trim();
        if (!cityInput) return;
        
        const coords = await getCoordinates(cityInput);
        if (coords) {
            currentLat = coords.lat;
            currentLon = coords.lon;
            currentCity = coords.name;
            await loadWeather(currentLat, currentLon, currentCity);
        } else {
            document.getElementById('weatherContent').innerHTML = '<div class="loading">❌ Город не найден</div>';
        }
    }
    
    // Тёмная тема
    function initTheme() {
        const saved = localStorage.getItem('eather_theme');
        if (saved === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('themeBtn').textContent = '☀️';
        } else {
            document.getElementById('themeBtn').textContent = '🌙';
        }
    }
    
    function toggleTheme() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('eather_theme', isDark ? 'dark' : 'light');
    }
    
    // Навигация по вкладкам (демо-переключение стиля)
    document.getElementById('navTabs').addEventListener('click', (e) => {
        const tab = e.target.closest('.nav-tab');
        if (tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            // Здесь можно добавить реальное переключение вида
        }
    });
    
    // Запуск
    initTheme();
    loadWeather(currentLat, currentLon, currentCity);
    
    document.getElementById('searchBtn').addEventListener('click', searchCity);
    document.getElementById('cityInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') searchCity();
    });
    document.getElementById('themeBtn').addEventListener('click', toggleTheme);
</script>
</body>
</html>
