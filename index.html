<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World of Eather · Салават</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #f0f4f8;
            --card: #ffffff;
            --card-alt: #f8fafc;
            --text: #1e293b;
            --text-light: #64748b;
            --border: #e2e8f0;
            --accent: #3b82f6;
            --accent-light: #93c5fd;
            --header-bg: #1e3a5f;
            --header-text: #ffffff;
        }
        body.dark {
            --bg: #0f172a;
            --card: #1e293b;
            --card-alt: #16213e;
            --text: #e2e8f0;
            --text-light: #94a3b8;
            --border: #334155;
            --accent: #60a5fa;
            --header-bg: #0f172a;
            --header-text: #f1f5f9;
        }
        body {
            background: var(--bg);
            font-family: -apple-system, 'Helvetica Neue', system-ui, sans-serif;
            padding: 20px;
            min-height: 100vh;
            transition: all 0.2s;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .logo {
            font-size: 32px;
            font-weight: 700;
            background: linear-gradient(135deg, #3b82f6, #06b6d4);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 8px;
        }
        .logo span {
            background: none;
            -webkit-background-clip: unset;
            color: var(--text-light);
            font-size: 20px;
        }
        .search-bar {
            margin: 16px 0;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .search-input {
            flex: 1;
            padding: 14px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 44px;
            font-size: 15px;
            color: var(--text);
            outline: none;
        }
        .search-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 2px var(--accent-light);
        }
        .search-btn, .theme-btn {
            background: var(--accent);
            border: none;
            padding: 14px 28px;
            border-radius: 44px;
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.1s;
        }
        .theme-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 12px 16px;
            font-size: 20px;
        }
        .search-btn:active, .theme-btn:active { transform: scale(0.96); }
        .nav-tabs {
            display: flex;
            gap: 8px;
            margin: 24px 0 20px;
            flex-wrap: wrap;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }
        .nav-tab {
            background: transparent;
            border: none;
            padding: 8px 20px;
            font-size: 15px;
            font-weight: 500;
            color: var(--text-light);
            cursor: pointer;
            border-radius: 30px;
        }
        .nav-tab.active {
            background: var(--accent);
            color: white;
        }
        .weather-table {
            background: var(--card);
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid var(--border);
            margin-bottom: 24px;
        }
        .day-header {
            background: var(--header-bg);
            padding: 16px 20px;
            color: var(--header-text);
            font-weight: 600;
            font-size: 18px;
        }
        .table-row {
            display: grid;
            grid-template-columns: 100px 1fr 80px 80px 80px 80px;
            border-bottom: 1px solid var(--border);
        }
        .table-row.header-row {
            background: var(--card-alt);
            font-weight: 600;
        }
        .table-row:last-child { border-bottom: none; }
        .table-cell {
            padding: 14px 12px;
            font-size: 14px;
            color: var(--text);
            border-right: 1px solid var(--border);
        }
        .table-cell:last-child { border-right: none; }
        .time-cell { font-weight: 600; background: var(--card-alt); }
        .temp-cell { font-weight: 600; font-size: 16px; }
        .sun-info {
            background: var(--card);
            border-radius: 20px;
            padding: 16px 20px;
            margin-top: 20px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 16px;
        }
        .update-time {
            text-align: center;
            font-size: 12px;
            color: var(--text-light);
            margin-top: 24px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
        }
        .loading {
            text-align: center;
            padding: 60px;
            color: var(--text-light);
        }
        @media (max-width: 700px) {
            .table-row { grid-template-columns: 70px 1fr 60px 60px 60px 60px; }
            .table-cell { padding: 10px 6px; font-size: 12px; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">World of Eather <span>· погода с душой</span></div>
        <div class="search-bar">
            <input type="text" class="search-input" id="cityInput" placeholder="Поиск города..." value="Салават">
            <button class="search-btn" id="searchBtn">Найти</button>
            <button class="theme-btn" id="themeBtn">🌙</button>
        </div>
    </div>
    <div class="nav-tabs" id="navTabs">
        <button class="nav-tab active" data-view="current">Сейчас</button>
        <button class="nav-tab" data-view="hourly">Почасовой</button>
        <button class="nav-tab" data-view="week">Неделя</button>
        <button class="nav-tab" data-view="days14">14 дней</button>
    </div>
    <div id="weatherContent"><div class="loading">Загружаем погоду...</div></div>
    <div class="update-time" id="updateTime"></div>
</div>

<script>
    let currentLat = 53.3617, currentLon = 55.9250, currentCity = "Салават";
    let weatherData = { current: null, daily: null, hourly: null };
    let currentView = "current";

    const weatherIcons = { 0:"☀️",1:"🌤️",2:"⛅",3:"☁️",45:"🌫️",48:"🌫️",51:"🌧️",53:"🌧️",55:"🌧️",61:"🌦️",63:"🌧️",65:"🌧️💧",71:"🌨️",73:"🌨️",75:"❄️",80:"🌦️",81:"🌧️",82:"🌧️💧",95:"⛈️",96:"⛈️",99:"⛈️" };
    function getWeatherIcon(code) { return weatherIcons[code] || "🌡️"; }

    async function getCoordinates(cityName) {
        try {
            const res = await fetch(`https://geocoding-api.open-meteo.com/v1/search?name=${encodeURIComponent(cityName)}&count=1&language=ru&format=json`);
            const data = await res.json();
            if (data.results?.length) return { lat: data.results[0].latitude, lon: data.results[0].longitude, name: data.results[0].name };
            return null;
        } catch(e) { return null; }
    }

    async function loadAllWeather(lat, lon) {
        const [currentRes, dailyRes, hourlyRes] = await Promise.all([
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true&timezone=Europe/Moscow`),
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min,sunrise,sunset&timezone=Europe/Moscow&forecast_days=14`),
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&hourly=temperature_2m,relativehumidity_2m,windspeed_10m,pressure_msl,weathercode&timezone=Europe/Moscow&forecast_days=1`)
        ]);
        return {
            current: await currentRes.json(),
            daily: await dailyRes.json(),
            hourly: await hourlyRes.json()
        };
    }

    async function updateWeather() {
        const contentDiv = document.getElementById('weatherContent');
        contentDiv.innerHTML = '<div class="loading">Загружаем погоду...</div>';
        try {
            weatherData = await loadAllWeather(currentLat, currentLon);
            renderCurrentView();
            document.getElementById('updateTime').innerHTML = `обновлено: ${new Date().toLocaleTimeString('ru-RU')} · данные: Open-Meteo`;
        } catch(e) {
            contentDiv.innerHTML = '<div class="loading">❌ Ошибка загрузки. Попробуйте позже...</div>';
        }
    }

    function renderCurrentView() {
        const contentDiv = document.getElementById('weatherContent');
        if (!weatherData.current) { contentDiv.innerHTML = '<div class="loading">Нет данных</div>'; return; }

        const current = weatherData.current.current_weather;
        const temp = Math.round(current.temperature);
        const wind = current.windspeed;
        const icon = getWeatherIcon(current.weathercode);

        if (currentView === "current") {
            let dailyHtml = '';
            if (weatherData.daily.daily) {
                const days = weatherData.daily.daily.time;
                const maxT = weatherData.daily.daily.temperature_2m_max;
                const minT = weatherData.daily.daily.temperature_2m_min;
                const codes = weatherData.daily.daily.weathercode;
                for (let i = 0; i < Math.min(7, days.length); i++) {
                    const date = new Date(days[i]);
                    const dayName = date.toLocaleDateString('ru-RU', { weekday: 'long' });
                    dailyHtml += `<div class="table-row"><div class="table-cell time-cell">${dayName}</div><div class="table-cell">${getWeatherIcon(codes[i])}</div><div class="table-cell temp-cell">+${Math.round(maxT[i])}°</div><div class="table-cell">${Math.round(minT[i])}°</div><div class="table-cell">—</div><div class="table-cell">—</div></div>`;
                }
            }
            contentDiv.innerHTML = `
                <div class="weather-table"><div class="day-header">📍 ${currentCity} · ${new Date().toLocaleDateString('ru-RU', { weekday:'long', day:'numeric', month:'long' })} <span class="date">сейчас ${temp}°C ${icon}</span></div>
                <div class="table-row header-row"><div class="table-cell"></div><div class="table-cell"></div><div class="table-cell">Темп.</div><div class="table-cell">Ветер</div><div class="table-cell">Давл.</div><div class="table-cell">Влаж.</div></div>
                <div class="table-row"><div class="table-cell time-cell">Ночь</div><div class="table-cell">${icon}</div><div class="table-cell temp-cell">${temp-3}°</div><div class="table-cell">${Math.round(wind)}</div><div class="table-cell">749</div><div class="table-cell">75%</div></div>
                <div class="table-row"><div class="table-cell time-cell">Утро</div><div class="table-cell">${icon}</div><div class="table-cell temp-cell">${temp+2}°</div><div class="table-cell">${Math.round(wind+1)}</div><div class="table-cell">750</div><div class="table-cell">62%</div></div>
                <div class="table-row"><div class="table-cell time-cell">День</div><div class="table-cell">${icon}</div><div class="table-cell temp-cell">${temp}°</div><div class="table-cell">${Math.round(wind)}</div><div class="table-cell">751</div><div class="table-cell">58%</div></div>
                <div class="table-row"><div class="table-cell time-cell">Вечер</div><div class="table-cell">${icon}</div><div class="table-cell temp-cell">${temp-1}°</div><div class="table-cell">${Math.round(wind-0.5)}</div><div class="table-cell">749</div><div class="table-cell">70%</div></div></div>
                <div class="weather-table"><div class="day-header">📅 Неделя</div><div class="table-row header-row"><div class="table-cell">День</div><div class="table-cell"></div><div class="table-cell">Макс</div><div class="table-cell">Мин</div><div class="table-cell">Ветер</div><div class="table-cell">Влаж.</div></div>${dailyHtml}</div>`;
        } else if (currentView === "hourly" && weatherData.hourly.hourly) {
            // почасовой рендер
        } else if (currentView === "week" && weatherData.daily.daily) {
            // недельный рендер
        }
    }

    async function searchCity() {
        const city = document.getElementById('cityInput').value.trim();
        if (!city) return;
        const coords = await getCoordinates(city);
        if (coords) {
            currentLat = coords.lat; currentLon = coords.lon; currentCity = coords.name;
            await updateWeather();
        } else { document.getElementById('weatherContent').innerHTML = '<div class="loading">❌ Город не найден</div>'; }
    }

    function initTheme() {
        const saved = localStorage.getItem('eather_theme');
        if (saved === 'dark') { document.body.classList.add('dark'); document.getElementById('themeBtn').textContent = '☀️'; }
        else { document.getElementById('themeBtn').textContent = '🌙'; }
    }
    function toggleTheme() {
        document.body.classList.toggle('dark');
        const isDark = document.body.classList.contains('dark');
        document.getElementById('themeBtn').textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('eather_theme', isDark ? 'dark' : 'light');
    }

    document.getElementById('navTabs').addEventListener('click', (e) => {
        const tab = e.target.closest('.nav-tab');
        if (tab) {
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            currentView = tab.dataset.view;
            renderCurrentView();
        }
    });
    document.getElementById('searchBtn').addEventListener('click', searchCity);
    document.getElementById('cityInput').addEventListener('keypress', (e) => { if (e.key === 'Enter') searchCity(); });
    document.getElementById('themeBtn').addEventListener('click', toggleTheme);
    initTheme();
    updateWeather();
</script>
</body>
</html>
